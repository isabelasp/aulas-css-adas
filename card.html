<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        bady{
            font-family: "Calibri";
        }
        .card{
            border: 1.2px solid blue;
            width: 200px;
            background-color: rgb(232, 98, 98);

        }

        .promo{
            border: 1.2px solid blue;
            width: 200px;
            background-color: yellow;
            margin: 8px;
        }

        img{
            width: 100%;
        }

        h2{
            text-align: center;
            color: black;

        h3{
            text-align: center;
            color: blue;
        }

        h1{
            color: blue;
        }

        p{
            text-align: center;
        }

        button{
            border: none;
            width: 100%;
            padding: 8px;
            background-color: red;
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Card</h1>

    <div class="card">

        <h3>Creme de Cabelo</h3>
        <p>89,90</p>
        <button>Compre Agora</button>

    <div class="promo">

</html>
