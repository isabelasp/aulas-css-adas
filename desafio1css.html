<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 1 CSS Adas</title>
    <style>
        *{
            margin: 0;
        }
        body{
            background-color: rgb(249, 5, 107);
        }
        .conteudo{
            width: 70%;
            height: 100vh;
            background-color: rgb(250, 70, 166);
            margin: auto;
            padding: 32px;
            margin-top: 50px;
        }

        .sessao-botes{
            width: 350px;
            margin: auto;
        }
        .btn-menu{
            background-color: rgb(249, 5, 107);
            color: white;
            padding: 8px;
            border: none;
            min-width: 100px;
        }
    </style>
</head>
<body>
   
    <div class="conteudo">
        <div class="sessao-botes">
            <button class="btn-menu">Home</button>
            <button class="btn-menu">Produto</button>
            <button class="btn-menu">Cadastro</button>
        </div>
    </div>
</body>
</html>
