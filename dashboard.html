<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        /*Reiniciar as propriedades do proproprio navegador*/
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1{
            margin-bottom: 16px;

        }

        .principal{
            width: 100%;
            height: 100vh;
            display: flex;
        }

        .menu{
            width: 15%;
            height: 100vh;
            background-color: rgb(97, 95, 245);
        }

        .conteudo{
            width: 85%;
            height: 100vh;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }

        .sessao-card{
          display: flex;
          justify-content: space-between;
        }

        .card{
          background-color:  rgb(97, 95, 245);
          width: 300px;
          padding: 48px 32px;
          color: rgb(255, 255, 255);
          border-bottom: solid 7px rgb(248, 5, 5);
          text-align: center;
        }

        /*estilizando o elemente h3 somente da classe card*/
        .card h3{
            font-size: 28px;
            margin-top: 16px;
            color: rgb(248, 5, 5);
        }
        
 
    </style>
</head>
<body>
    <div class="principal">
        <div class="menu"></div>
        <div class="conteudo">
            <div>
                <h1>Dashboard</h1>
            </div>
            <div class="sessao-card">
                <div class="card">
                    <p>Itens Vendidos</p>
                    <h3>158</h3>
                </div>
                <div class="card">
                    <p>Taxa Lucro</p>
                    <h3>77%</h3>
                </div>
                <div class="card">
                    <p>Despesas Julho</p>
                    <h3>R$ 25.212,00</h3>
                </div>
            </div>
            
        </div>
    </div>
    
</body>
</html>
