<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Layout</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box
    }

    .principal{
        background-color: rgb(103, 103, 244);
        width: 100%;
        height: 100vh;
        padding: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login{
        background-color: rgb(255, 255, 255);
        width: 500px;
        height: 700px;
        justify-content: center;
        align-items: center
    }

    .button{
        background-color: rgb(255, 255, 255);
        width: 180px;
        height: 80px;
        border-radius: 8px;
        text-align: center;
        font-size: 24px;
        padding: 8px;
    }

</style>
<body>
    <div class="principal">
        <div class="login">
            <button class="button">Entrar</button>
        </div>
    </div>
    
</body>
</html>
