<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplos De Bordas</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: tomato;
            margin-bottom: 16px;
        }
        .borda-simples{
            border: solid seagreen 2px;
        }

         .borda-esquerda{
            border-left: solid brown 7px;
        }

        .borda-arredondada{
            border-radius: 25px;
        }

         .borda-circular{
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>Exemplos de bordas</h1>

    <div></div>
    <div class="borda-simples"></div>
    <div class="borda-esquerda"></div>
    <div class="borda-arredondada"></div>
    <div class="borda-circular"></div>

</body>
</html>
